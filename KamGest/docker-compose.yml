services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: projet1-backend
    working_dir: /app
    command: sh /app/docker/backend/entrypoint.sh
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      MINIO_ENABLED: "1"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: ticketing
      MINIO_USE_SSL: "0"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projet1-frontend
    working_dir: /app
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  minio:
    image: minio/minio:latest
    container_name: projet1-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    container_name: projet1-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/ticketing || true
      "

volumes:
  frontend_node_modules:
  minio_data:
